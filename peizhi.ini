[custom]
rules:
- DST-PORT,7895,REJECT
- DST-PORT,7892,REJECT
- IP-CIDR,198.18.0.1/16,REJECT,no-resolve
- RULE-SET,apple_cdn,DIRECT
- RULE-SET,microsoft_cdn,DIRECT
- RULE-SET,domestic_non_ip,DIRECT
- RULE-SET,direct_non_ip,DIRECT
- RULE-SET,download1,DIRECT
- RULE-SET,download2,DIRECT
- RULE-SET,porn,DIRECT
- "RULE-SET,gfwlist,节点选择"
- "RULE-SET,stream,节点选择"
- "RULE-SET,streamip,节点选择"
- "RULE-SET,telegram,节点选择"
- "RULE-SET,telegramip,节点选择"
- "RULE-SET,global,节点选择"
- RULE-SET,ipv4,DIRECT
- "MATCH,节点选择"

